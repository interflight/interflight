<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Interflight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
<link href="./css/stylesheet.css" rel="stylesheet" type="text/css">
	
	<style> 
		h1{
			font-family: "Fjalla One";
			font-size: 100px;
			text-align: center;
			color: white;
			margin: 0;
		}
		
		h2{
			font-family: "Fjalla One";
			font-size: 50px;
			text-align: center;
			color: white;
			margin: 50px;
		}
		
		p{
			font-family: "Fjalla One";
			text-align: center;
			color: grey;
		}
		
		body{
			background-color: black;
		}
		
	 .audio-container {
		  display: flex;
		  justify-content: center;
		  align-items: center; 
	}
		
		.track{
			margin: 50px;
		}
		
		.centred-img{
		display: block;
		width: 12%;
		margin: auto;
		}
		
		.centred-img-small{
		display: block;
		width: 5%;
		margin: auto;
		}
		
		.header-text-img{
			display: flex;
			flex-direction: column;
			padding: 0;
			margin-bottom: 100px;
		}
		
		.subhead-messages{
			display: flex;
			flex-direction: column;
			margin: 100px;
		}
		
		.subhead-messages p{
			padding: 0;
			margin: 5px;
		}
		
		footer{
			margin: 50px;
		}
	</style>
	
</head>

<body>

	<div class="header-text-img">
		<div class="centred-img">
			<img src="img/if.svg" alt=""/>
		</div> 
		<h1>Welcome to the Interflight website</h1>
	</div>
	
	<div class="subhead-messages">
		<p>This page will be updated soon.</p>
		<p>For now you can go outside, see your family, touch grass.</p>
		<p>We will be back shortly.</p>
	</div>


<h2>You may want to listen to some music</h2>

	<div class="track">
		<p>Hope Springs Eternal</p> 
		<div class="audio-container">
		  <audio controls>
				<source src="./audio/hope springs eternal.mp3" type="audio/mpeg">
		  </audio>
		</div>
	</div>

	<div class="track">
		<p>Blind</p> 
		<div class="audio-container">
		<audio controls>
			<source src="./audio/blind.mp3" type="audio/mpeg">
		 </audio>
		</div>
	</div>


	<div class="track">
		<p>Frantic Former</p> 
		<div class="audio-container">
		  <audio controls>
				<source src="./audio/frantic former.mp3" type="audio/mpeg">
		  </audio>
		</div>
	</div>
	
	<div class="track">
		<p>A Thousand Lands</p> 
		<div class="audio-container">
		  <audio controls>
				<source src="./audio/a thousand lands.mp3" type="audio/mpeg">
		  </audio>
		</div>
	</div>
	
	<footer>
		<div class="centred-img-small">
			<img src="img/if circle.svg" alt=""/>
		</div> 
	</footer>
	
</body>
	
	
</html>
